<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #1f2328; }
    .container { padding: 16px; }
    h3 { font-size: 15px; margin-bottom: 12px; color: #24292f; }
    .status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; font-size: 13px; }
    .connected { background: #dafbe1; color: #116329; }
    .disconnected { background: #ffebe9; color: #cf222e; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok { background: #1a7f37; }
    .dot.err { background: #cf222e; }
    .info { margin-top: 12px; padding: 10px 12px; background: #f6f8fa; border-radius: 6px; font-size: 12px; line-height: 1.6; color: #656d76; }
    .info dt { font-weight: 600; color: #24292f; }
    .info dd { margin-left: 0; }
    .help { margin-top: 12px; font-size: 12px; color: #656d76; line-height: 1.6; }
    .help code { background: #f6f8fa; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <h3>Agent Sphere</h3>
    <div id="statusBar" class="status disconnected">
      <span class="dot err"></span>
      <span id="statusText">Not connected</span>
    </div>
    <div id="infoPanel" class="info" style="display:none">
      <dl>
        <dt>User</dt>
        <dd id="userName">-</dd>
        <dt>Session</dt>
        <dd id="sessionInfo">-</dd>
        <dt>Server</dt>
        <dd id="serverInfo">-</dd>
      </dl>
    </div>
    <div id="helpPanel" class="help">
      <p>💡 Open the <strong>AgentSphere</strong> web app and log in. The extension will automatically detect your session.</p>
      <p style="margin-top:8px">Once connected, the AI can control your browser — navigate, click, type, and extract content.</p>
      <p style="margin-top:8px;font-size:11px;color:#999">
        Make sure the web page is open in an active tab.
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
