<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 13px; color: #1f2328; background: #ffffff; }
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f5f5f7; }
      .card { background: #2c2c2e; }
      .tab { color: #98989d; }
      .tab.active { color: #0a84ff; border-bottom-color: #0a84ff; }
      .field input { background: #3a3a3c; color: #f5f5f7; border-color: #48484a; }
      .field label { color: #98989d; }
      .log-row { border-bottom-color: #38383a; }
    }
    .container { padding: 16px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .header h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .status-badge.on { background: #dafbe1; color: #116329; }
    .status-badge.off { background: #ffebe9; color: #cf222e; }
    .status-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-badge.on .dot { background: #1a7f37; }
    .status-badge.off .dot { background: #cf222e; }
    .tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid #e8e8ed; }
    @media (prefers-color-scheme: dark) { .tabs { border-bottom-color: #38383a; } }
    .tab { flex: 1; padding: 8px 0; text-align: center; font-size: 13px; font-weight: 500; color: #8e8e93; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; user-select: none; }
    .tab:hover { color: #0a84ff; }
    .tab.active { color: #0a84ff; border-bottom-color: #0a84ff; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: #f2f2f7; border-radius: 12px; padding: 12px 14px; }
    .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .info-row + .info-row { border-top: 1px solid #e8e8ed; }
    @media (prefers-color-scheme: dark) { .info-row + .info-row { border-top-color: #38383a; } }
    .info-row .label { color: #8e8e93; }
    .info-row .value { font-weight: 500; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .field input { width: 100%; padding: 8px 10px; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 13px; outline: none; transition: border-color .2s; background: #ffffff; color: #1f2328; }
    .field input:focus { border-color: #0a84ff; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn-primary { background: #0a84ff; color: #fff; }
    .btn-primary:hover { opacity: .85; }
    .btn-primary:active { opacity: .7; }
    .btn-danger { background: #ff3b30; color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .btn-danger:active { opacity: .7; }
    .btn-saved { background: #dafbe1; color: #116329; pointer-events: none; }
    .help-text { margin-top: 8px; font-size: 11px; color: #8e8e93; line-height: 1.5; }
    .log-list { max-height: 200px; overflow-y: auto; }
    .log-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; font-size: 12px; border-bottom: 1px solid #e8e8ed; }
    .log-time { color: #8e8e93; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .log-icon { flex-shrink: 0; }
    .log-action { font-weight: 500; flex-shrink: 0; }
    .log-detail { color: #8e8e93; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty { text-align: center; padding: 24px 0; color: #8e8e93; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="header">
      <span style="font-size:20px">🤖</span>
      <h3>AgentSphere</h3>
      <span id="statusBadge" class="status-badge off" style="margin-left:auto"><span class="dot"></span><span id="statusText">Off</span></span>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="info">Info</div>
      <div class="tab" data-tab="settings">Settings</div>
      <div class="tab" data-tab="logs">Logs</div>
    </div>

    <!-- Info Panel -->
    <div id="panelInfo" class="panel active">
      <div class="card">
        <div class="info-row"><span class="label">User</span><span class="value" id="infoUser">-</span></div>
        <div class="info-row"><span class="label">Session</span><span class="value" id="infoSession">-</span></div>
        <div class="info-row"><span class="label">Backend</span><span class="value" id="infoBackend">-</span></div>
        <div class="info-row"><span class="label">Frontend</span><span class="value" id="infoFrontend">-</span></div>
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="panelSettings" class="panel">
      <div class="card">
        <div class="field">
          <label>Frontend URL</label>
          <input id="inputFrontend" type="url" placeholder="http://localhost:8000">
        </div>
        <div class="field">
          <label>Backend URL</label>
          <input id="inputBackend" type="url" placeholder="http://localhost:8080">
        </div>
        <button id="btnSave" class="btn btn-primary">Save Settings</button>
        <div class="help-text">Changes take effect on the next session switch or page refresh.</div>
      </div>
    </div>

    <!-- Logs Panel -->
    <div id="panelLogs" class="panel">
      <div class="card" style="padding:4px 6px">
        <div id="logContainer" class="log-list">
          <div class="empty">No operations yet</div>
        </div>
        <button id="btnClearLogs" class="btn btn-danger" style="margin-top:8px">Clear Logs</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
